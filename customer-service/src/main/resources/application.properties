server.port=9201
spring.application.name=customer-service

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=banking_customer_db;encrypt=true;trustServerCertificate=true
spring.datasource.username=test
spring.datasource.password=test123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.customer_service.event.TransactionEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false

app.kafka.topic.transaction=transaction-topic